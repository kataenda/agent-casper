name: Build YieldVault WASM

# Builds the Odra contract to wasm in CI (Linux has the full toolchain), so the
# wasm can be produced without a local MSVC/C++ setup. Download the artifact and
# deploy it with scripts/deploy_testnet.sh using your funded testnet key.

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/build-contract.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.toml') }}

      - name: Install cargo-odra + wabt
        run: |
          sudo apt-get update && sudo apt-get install -y wabt
          cargo install cargo-odra --locked

      - name: Build contract (casper backend)
        working-directory: contracts
        run: cargo odra build -b casper

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: yield_vault-wasm
          path: contracts/wasm/yield_vault.wasm
          if-no-files-found: error
