name: Build YieldVault WASM

on:
  push:
    branches: [master]
    paths:
      - 'contracts/src/**'
      - 'contracts/Cargo.toml'
      - 'contracts/Odra.toml'
      - 'contracts/rust-toolchain.toml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # cargo-odra requires edition2024 — needs a newer toolchain to install
      # The contract build itself uses nightly-2023-12-15 via rust-toolchain.toml
      - name: Install stable Rust (for cargo-odra install)
        uses: dtolnay/rust-toolchain@stable

      - name: Install nightly-2023-12-15 + wasm target (for contract build)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2023-12-15
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install wasm-opt + wabt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y binaryen wabt

      - name: Install cargo-odra (via stable toolchain)
        run: cargo +stable install cargo-odra

      - name: Build WASM (cargo-odra uses rust-toolchain.toml = nightly-2023-12-15)
        working-directory: contracts
        run: cargo odra build -b casper

      - name: Locate and copy WASM
        working-directory: contracts
        run: |
          echo "=== searching for built WASM ==="
          find . -name "*.wasm" ! -path "*/node_modules/*" | sort
          WASM=$(find . -name "yield_vault.wasm" ! -path "*/node_modules/*" | grep -v "^./wasm" | head -1)
          if [ -z "$WASM" ]; then
            WASM=$(find . -name "*.wasm" ! -path "*/node_modules/*" | grep -v "^./wasm" | head -1)
          fi
          echo "Using: $WASM"
          mkdir -p wasm
          cp "$WASM" wasm/yield_vault.wasm
          ls -lh wasm/yield_vault.wasm

      - name: Verify call export
        run: wasm-objdump -x contracts/wasm/yield_vault.wasm | grep -i export

      - name: Commit WASM artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contracts/wasm/yield_vault.wasm
          if git diff --staged --quiet; then
            echo "No WASM changes to commit"
          else
            git commit -m "build: YieldVault WASM [skip ci]"
            git push
          fi
