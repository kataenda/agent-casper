name: Build YieldVault WASM

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile Rust to WASM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly-2025-02-25 + wasm target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-25
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: nightly-20250225-${{ hashFiles('contracts/Cargo.toml', 'contracts/Cargo.lock') }}
          restore-keys: |
            nightly-20250225-

      - name: Build WASM (Odra Casper backend)
        # ODRA_MODULE and ODRA_BACKEND are read by Odra's proc-macros at compile time
        # to emit the `call` WASM export required by Casper runtime.
        working-directory: contracts
        env:
          ODRA_MODULE: YieldVault
          ODRA_BACKEND: casper
        run: |
          cargo +nightly-2025-02-25 build \
            --target wasm32-unknown-unknown \
            --bin yield_vault_build_contract \
            --release

      - name: Copy & rename WASM
        run: |
          mkdir -p contracts/wasm
          cp contracts/target/wasm32-unknown-unknown/release/yield_vault_build_contract.wasm \
             contracts/wasm/yield_vault.wasm

      - name: Verify WASM size (must be > 50 KB)
        run: |
          WASM=contracts/wasm/yield_vault.wasm
          SIZE=$(stat -c%s "$WASM")
          echo "WASM size: ${SIZE} bytes ($(echo "scale=1; $SIZE/1024" | bc) KB)"
          if [ "$SIZE" -lt 51200 ]; then
            echo "ERROR: WASM is too small (${SIZE} bytes). Build probably failed silently."
            exit 1
          fi
          ls -lh "$WASM"

      - name: Commit WASM artifact
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f contracts/wasm/yield_vault.wasm
          git diff --staged --quiet || git commit -m "build: YieldVault WASM [skip ci]"
          git push
