name: Build YieldVault WASM

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile Rust to WASM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly-2025-02-25 + wasm target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-25
          targets: wasm32-unknown-unknown

      - name: Install wasm-strip and wasm-opt
        run: |
          sudo apt-get update -q
          sudo apt-get install -y wabt binaryen

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: cargo-

      - name: Install cargo-odra
        run: cargo install cargo-odra --version 0.1.7 --locked

      - name: Build WASM via cargo odra build
        # cargo odra build (no flags) reads Odra.toml, builds each contract,
        # runs wasm-strip + wasm-opt, and writes output to contracts/wasm/
        working-directory: contracts
        run: cargo odra build

      - name: Show build output
        run: ls -lh contracts/wasm/

      - name: Verify WASM size (must be > 50 KB)
        run: |
          WASM=contracts/wasm/yield_vault.wasm
          if [ ! -f "$WASM" ]; then
            echo "ERROR: $WASM not found"
            echo "Files in wasm dir:"
            ls -la contracts/wasm/ || echo "(empty)"
            exit 1
          fi
          SIZE=$(stat -c%s "$WASM")
          echo "WASM size: ${SIZE} bytes ($(echo "scale=1; $SIZE/1024" | bc) KB)"
          if [ "$SIZE" -lt 51200 ]; then
            echo "ERROR: WASM too small (${SIZE} bytes). Odra did not generate call export."
            exit 1
          fi

      - name: Commit WASM artifact
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f contracts/wasm/yield_vault.wasm
          git diff --staged --quiet || git commit -m "build: YieldVault WASM [skip ci]"
          git push
