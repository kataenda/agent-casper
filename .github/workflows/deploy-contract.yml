name: Build YieldVault WASM

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile Rust → WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('contracts/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache contract target
        uses: actions/cache@v4
        with:
          path: contracts/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('contracts/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-target-

      - name: Install cargo-odra
        run: cargo install cargo-odra

      - name: Build YieldVault WASM
        working-directory: contracts
        run: |
          cargo odra build --help || true
          cargo odra build --backend casper 2>/dev/null || cargo odra build || cargo build --features casper --target wasm32-unknown-unknown --release
          mkdir -p wasm
          find target -name "*.wasm" | head -5

      - name: Locate and copy WASM
        run: |
          mkdir -p contracts/wasm
          WASM=$(find contracts/target -name "*.wasm" | head -1)
          if [ -z "$WASM" ]; then echo "ERROR: no WASM found"; exit 1; fi
          echo "Found WASM: $WASM"
          cp "$WASM" contracts/wasm/yield_vault.wasm
          ls -lh contracts/wasm/

      - name: Commit WASM to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contracts/wasm/yield_vault.wasm
          git diff --staged --quiet || git commit -m "build: YieldVault WASM [skip ci]"
          git push
