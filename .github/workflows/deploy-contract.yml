name: Build YieldVault WASM

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile Rust to WASM
    runs-on: ubuntu-latest
    container: rust:1.81

    steps:
      - uses: actions/checkout@v4

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: rust181-${{ hashFiles('contracts/Cargo.toml') }}

      - name: Build WASM
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Copy WASM to output
        run: |
          mkdir -p contracts/wasm
          cp contracts/target/wasm32-unknown-unknown/release/yield_vault.wasm contracts/wasm/yield_vault.wasm
          ls -lh contracts/wasm/

      - name: Commit WASM to repo
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add contracts/wasm/yield_vault.wasm
          git diff --staged --quiet || git commit -m "build: YieldVault WASM [skip ci]"
          git push
