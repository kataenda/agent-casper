name: Build YieldVault WASM

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile Rust to WASM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly-2025-02-25 + wasm target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-25
          targets: wasm32-unknown-unknown

      - name: Install wasm-strip and wasm-opt
        run: |
          sudo apt-get update -q
          sudo apt-get install -y wabt binaryen

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: cargo-

      - name: Build WASM via direct Cargo build
        # We invoke cargo build targeting wasm32-unknown-unknown directly,
        # specifying the ODRA_BACKEND=casper environment variable which triggers
        # the Odra proc-macros to generate the required Casper entry points.
        working-directory: contracts
        env:
          ODRA_BACKEND: casper
          RUST_BACKTRACE: 1
        run: |
          cargo build --target wasm32-unknown-unknown --release --lib --verbose
          mkdir -p wasm
          # Find the generated WASM file anywhere under the root target directory
          WASM_PATH=$(find ../target -name "yield_vault.wasm" | head -n 1)
          if [ -z "$WASM_PATH" ]; then
            WASM_PATH=$(find ../../target -name "yield_vault.wasm" | head -n 1)
          fi
          if [ -z "$WASM_PATH" ]; then
            echo "ERROR: yield_vault.wasm not found in target directories"
            find ../ -name "*.wasm"
            exit 1
          fi
          echo "Found WASM at: $WASM_PATH"
          wasm-strip "$WASM_PATH"
          wasm-opt -O3 "$WASM_PATH" -o wasm/yield_vault.wasm

      - name: Show build output
        run: ls -lh contracts/wasm/

      - name: Verify WASM size (must be > 50 KB)
        run: |
          WASM=contracts/wasm/yield_vault.wasm
          if [ ! -f "$WASM" ]; then
            echo "ERROR: $WASM not found"
            echo "Files in wasm dir:"
            ls -la contracts/wasm/ || echo "(empty)"
            exit 1
          fi
          SIZE=$(stat -c%s "$WASM")
          echo "WASM size: ${SIZE} bytes ($(echo "scale=1; $SIZE/1024" | bc) KB)"
          if [ "$SIZE" -lt 51200 ]; then
            echo "ERROR: WASM too small (${SIZE} bytes). Odra did not generate call export."
            exit 1
          fi

      - name: Commit WASM artifact
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f contracts/wasm/yield_vault.wasm
          git diff --staged --quiet || git commit -m "build: YieldVault WASM [skip ci]"
          git push
