name: Build YieldVault WASM

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile Rust to WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + wasm32 target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: contracts/target
          key: ${{ runner.os }}-target-${{ hashFiles('contracts/Cargo.toml', 'contracts/src/**') }}
          restore-keys: ${{ runner.os }}-target-

      - name: Build WASM
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Copy WASM to output
        run: |
          mkdir -p contracts/wasm
          cp contracts/target/wasm32-unknown-unknown/release/yield_vault.wasm contracts/wasm/yield_vault.wasm
          ls -lh contracts/wasm/

      - name: Commit WASM to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contracts/wasm/yield_vault.wasm
          git diff --staged --quiet || git commit -m "build: YieldVault WASM [skip ci]"
          git push
