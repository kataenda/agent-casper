[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
# `next build` regenerates output from current source every time. A fresh commit
# (new SHA) is what forces Coolify to rebuild — do NOT `rm -rf .next` here, it
# collides with the nixpacks BuildKit cache mount at .next/cache (device busy).
cmds = ["npm run build"]
